<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Acesso reservado</title>
    <meta name="description" content="Portal de revisão por link reservado." />
    <meta name="robots" content="noindex,nofollow,noarchive,noimageindex,nosnippet" />
    <meta name="googlebot" content="noindex,nofollow,noarchive,noimageindex,nosnippet" />
    <meta name="bingbot" content="noindex,nofollow,noarchive,nosnippet" />
    <meta name="referrer" content="no-referrer" />
    <meta name="theme-color" content="#08786e" />
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css?v=secure-20260703" />
  </head>
  <body>
    <main class="gate">
      <section class="gate-card" aria-live="polite">
        <span class="mark" aria-hidden="true"></span>
        <p class="eyebrow">Acesso reservado</p>
        <h1>Acesso reservado</h1>
        <p>Este conteúdo é protegido no navegador. Use o link completo recebido ou cole o código de acesso para abrir.</p>

        <form id="accessForm" class="access-form">
          <label>
            Código de acesso
            <input id="accessToken" type="password" autocomplete="off" placeholder="Cole o código recebido" required />
          </label>
          <button type="submit">Desbloquear</button>
        </form>

        <p id="statusText" class="status">Aguardando código.</p>
        <noscript>Ative JavaScript para abrir o conteúdo reservado.</noscript>
      </section>
    </main>

    <section id="viewer" class="viewer" hidden>
      <iframe id="demoFrame" title="Conteúdo reservado"></iframe>
    </section>

    <script src="app.js?v=secure-20260703"></script>
  </body>
</html>
